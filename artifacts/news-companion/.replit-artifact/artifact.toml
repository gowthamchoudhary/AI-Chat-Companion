kind = "web"
previewPath = "/"
title = "AI News Companion"
version = "1.0.0"
id = "artifacts/news-companion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24815

[services.development]
run = "pnpm --filter @workspace/news-companion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/news-companion", "run", "build" ]
publicDir = "artifacts/news-companion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24815"
BASE_PATH = "/"
